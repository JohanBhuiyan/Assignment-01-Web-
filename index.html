<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webflow Conference</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- Raleway Font -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo-title">
                <a href="" class="color-blue inter-font">LOGO</a>
            </div>
            <button class="button-primary">Sign Up</button>
        </nav>
        <div class="banner">
            <h3 class="raleway-font">Cool Dark UI Template for<br>Webflow Agencies!</h3>
            <button class="button-primary">Stay Focused</button>
        </div>
    </header>

    <main>
        <div class="action-section raleway-font">
            <div class="action-content">
            <h4>See It in Action</h4>
            <p>Explore the live preview and imagine your<br>brand in this bold new look.</p>
            <button class="button-primary">Launch Live Preview</button>
            </div>
            <div class="action-content">
                <img src="B12A01-landing-launchpad-main/Assets/wc-mini.png" alt="">
            </div>
        </div>
        <div class="user-count-section">
            <h4 class="raleway-font">Joined Thousands of Productive Users</h4>
            <div class="user-statistics">
                <div class="user-stat">
                    <h5 class="inter-font color-blue">50K</h5>
                    <p class="inter-font color-secondary-gray">Active Users</p>
                </div>
                <div class="user-stat">
                    <h5 class="inter-font color-blue">2M+</h5>
                    <p class="inter-font color-secondary-gray">Focus Sessions</p>
                </div>
                <div class="user-stat">
                    <h5 class="inter-font color-blue">95%</h5>
                    <p class="inter-font color-secondary-gray">Satisfaction Rate</p>
                </div>
            </div>
        </div>
    </main>

    <footer>

    </footer>
</body>
</html>
